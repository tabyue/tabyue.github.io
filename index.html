<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 元数据部分，包含页面的基本配置信息 -->
    <meta charset="UTF-8"> <!-- 设置字符编码为UTF-8，确保中文正确显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 让页面在移动端正常显示 -->
    <meta name="description" content="这是我的个人网站主页。"> <!-- 页面描述，对SEO很重要 -->
    <meta name="keywords" content="个人网站, 主页"> <!-- 页面关键词 -->
    <title>我的个人主页</title> <!-- 显示在浏览器标签页上的标题 -->
    <!-- 链接外部CSS样式表 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 页面头部区域，通常包含网站标题和导航 -->
    <header>
        <h1>欢迎来到我的个人空间</h1>
        <nav>
            <ul>
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于我</a></li>
                <li><a href="#contact">联系我</a></li>
            </ul>
        </nav>
    </header>

    <!-- 页面主体内容区域 -->
    <main>
        <section id="home">
            <h2>首页</h2>
            <p>这里是网站的主要介绍内容。</p>
        </section>

        <section id="about">
            <h2>关于我</h2>
            <p>在这里介绍一下你自己。</p>
        </section>

        <section id="contact">
            <h2>联系我</h2>
            <p>通过邮箱 example@example.com 与我联系。</p>
        </section>
    </main>

    <!-- 页面页脚区域，通常包含版权信息等 -->
    <footer>
        <p>&copy; 2025 我的个人主页. 保留所有权利.</p>
    </footer>

    <!-- 链接外部JavaScript文件 -->
    <script src="script.js"></script>
</body>
</html>
